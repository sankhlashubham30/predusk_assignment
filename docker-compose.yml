services:

  # PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: docflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-docflow_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-docflow_pass}
      POSTGRES_DB: ${POSTGRES_DB:-docflow_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-docflow_user} -d ${POSTGRES_DB:-docflow_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docflow_net

  # Redis
  redis:
    image: redis:7-alpine
    container_name: docflow_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - docflow_net

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docflow_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-docflow_user}:${POSTGRES_PASSWORD:-docflow_pass}@db:5432/${POSTGRES_DB:-docflow_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - docflow_net

  # Celery Worker
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docflow_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-docflow_user}:${POSTGRES_PASSWORD:-docflow_pass}@db:5432/${POSTGRES_DB:-docflow_db}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy
    command: celery -A app.workers.celery_app worker --loglevel=info --queues=documents --concurrency=2
    networks:
      - docflow_net

  # Celery Flower
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: docflow_flower
    restart: unless-stopped
    env_file: .env
    environment:
      CELERY_BROKER_URL: redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker
    command: celery -A app.workers.celery_app flower --port=5555
    networks:
      - docflow_net

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_APP_NAME: DocFlow
    container_name: docflow_frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - docflow_net

volumes:
  postgres_data:
  redis_data:
  uploads_data:

networks:
  docflow_net:
    driver: bridge
